<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Musubi-dachi: Heels together, toes apart at 45° -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body -->
    <rect x="46" y="23" width="8" height="35" rx="2"/>
    <!-- Arms at sides -->
    <rect x="35" y="25" width="11" height="6" rx="2"/>
    <rect x="54" y="25" width="11" height="6" rx="2"/>
    <!-- Legs straight -->
    <rect x="43" y="58" width="5" height="45" rx="2"/>
    <rect x="52" y="58" width="5" height="45" rx="2"/>
    <!-- Feet - toes out -->
    <ellipse cx="42" cy="107" rx="8" ry="4" transform="rotate(-25 42 107)"/>
    <ellipse cx="58" cy="107" rx="8" ry="4" transform="rotate(25 58 107)"/>
  </g>
</svg>