<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Hanten: Turning/pivoting stance -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body turning -->
    <rect x="46" y="23" width="8" height="30" rx="2" transform="rotate(-12 50 38)"/>
    <!-- Arms in turning motion -->
    <rect x="34" y="28" width="12" height="6" rx="2" transform="rotate(-60 40 31)"/>
    <rect x="54" y="28" width="12" height="6" rx="2" transform="rotate(50 60 31)"/>
    <!-- Pivoting leg -->
    <rect x="42" y="53" width="6" height="32" rx="2" transform="rotate(-10 45 69)"/>
    <rect x="40" y="82" width="6" height="20" rx="2"/>
    <!-- Turning leg -->
    <rect x="56" y="53" width="6" height="28" rx="2" transform="rotate(25 59 67)"/>
    <rect x="60" y="78" width="6" height="18" rx="2" transform="rotate(15 63 87)"/>
    <!-- Feet -->
    <ellipse cx="41" cy="104" rx="7" ry="3" transform="rotate(-5 41 104)"/>
    <ellipse cx="65" cy="98" rx="7" ry="3" transform="rotate(30 65 98)"/>
    <!-- Rotation arc -->
    <path d="M 55 45 A 15 15 0 0 1 65 55" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>