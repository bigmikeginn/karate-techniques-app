<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Soto-kaiten-dachi: Outward rotation stance -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body rotating -->
    <rect x="46" y="23" width="8" height="32" rx="2" transform="rotate(-8 50 39)"/>
    <!-- Arms in rotation -->
    <rect x="37" y="28" width="10" height="6" rx="2" transform="rotate(-50 42 31)"/>
    <rect x="53" y="28" width="10" height="6" rx="2" transform="rotate(40 58 31)"/>
    <!-- Legs in rotation -->
    <rect x="38" y="55" width="6" height="28" rx="2" transform="rotate(-20 41 69)"/>
    <rect x="56" y="55" width="6" height="28" rx="2" transform="rotate(10 59 69)"/>
    <rect x="36" y="80" width="6" height="22" rx="2"/>
    <rect x="54" y="80" width="6" height="22" rx="2"/>
    <!-- Feet -->
    <ellipse cx="37" cy="105" rx="7" ry="3" transform="rotate(-25 37 105)"/>
    <ellipse cx="57" cy="105" rx="7" ry="3" transform="rotate(15 57 105)"/>
  </g>
</svg>