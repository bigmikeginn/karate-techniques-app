<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Kosa-dachi: Cross-legged stance -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body -->
    <rect x="46" y="23" width="8" height="30" rx="2"/>
    <!-- Arms -->
    <rect x="36" y="26" width="10" height="6" rx="2" transform="rotate(-30 41 29)"/>
    <rect x="54" y="26" width="10" height="6" rx="2" transform="rotate(30 59 29)"/>
    <!-- Crossed legs -->
    <rect x="40" y="53" width="6" height="30" rx="2" transform="rotate(-15 43 68)"/>
    <rect x="54" y="53" width="6" height="30" rx="2" transform="rotate(15 57 68)"/>
    <rect x="38" y="80" width="6" height="22" rx="2" transform="rotate(-5 41 91)"/>
    <rect x="56" y="80" width="6" height="22" rx="2" transform="rotate(5 59 91)"/>
    <!-- Feet crossed -->
    <ellipse cx="38" cy="105" rx="7" ry="3" transform="rotate(-15 38 105)"/>
    <ellipse cx="62" cy="105" rx="7" ry="3" transform="rotate(15 62 105)"/>
  </g>
</svg>