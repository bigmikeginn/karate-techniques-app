<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Seiza: Formal kneeling position -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="20" r="8"/>
    <!-- Body upright -->
    <rect x="46" y="28" width="8" height="30" rx="2"/>
    <!-- Arms/hands on thighs -->
    <rect x="38" y="50" width="10" height="5" rx="2"/>
    <rect x="52" y="50" width="10" height="5" rx="2"/>
    <!-- Thighs -->
    <rect x="42" y="58" width="6" height="20" rx="2"/>
    <rect x="52" y="58" width="6" height="20" rx="2"/>
    <!-- Lower legs tucked under -->
    <rect x="40" y="76" width="20" height="8" rx="2"/>
    <!-- Feet tucked -->
    <ellipse cx="42" cy="86" rx="6" ry="3"/>
    <ellipse cx="58" cy="86" rx="6" ry="3"/>
  </g>
</svg>