<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Uchi-hachiji-dachi: Inner figure-eight stance, toes slightly in -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body -->
    <rect x="46" y="23" width="8" height="35" rx="2"/>
    <!-- Arms at sides -->
    <rect x="35" y="25" width="11" height="6" rx="2"/>
    <rect x="54" y="25" width="11" height="6" rx="2"/>
    <!-- Legs straight, slightly inward -->
    <rect x="42" y="58" width="5" height="45" rx="2" transform="rotate(-2 44 80)"/>
    <rect x="53" y="58" width="5" height="45" rx="2" transform="rotate(2 56 80)"/>
    <!-- Feet - toes slightly in -->
    <ellipse cx="43" cy="107" rx="8" ry="4" transform="rotate(10 43 107)"/>
    <ellipse cx="57" cy="107" rx="8" ry="4" transform="rotate(-10 57 107)"/>
  </g>
</svg>