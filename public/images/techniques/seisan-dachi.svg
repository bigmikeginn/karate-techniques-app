<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Seisan-dachi: Front stance, front knee bent -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body leaning forward -->
    <rect x="46" y="23" width="8" height="30" rx="2" transform="rotate(5 50 38)"/>
    <!-- Arms in guard position -->
    <rect x="38" y="28" width="8" height="12" rx="2" transform="rotate(-45 42 34)"/>
    <rect x="54" y="28" width="8" height="12" rx="2" transform="rotate(45 58 34)"/>
    <!-- Front leg bent -->
    <rect x="52" y="52" width="6" height="25" rx="2" transform="rotate(10 55 64)"/>
    <rect x="50" y="76" width="6" height="25" rx="2"/>
    <!-- Back leg straight -->
    <rect x="38" y="52" width="5" height="50" rx="2" transform="rotate(-5 40 77)"/>
    <!-- Feet -->
    <ellipse cx="36" cy="103" rx="7" ry="3" transform="rotate(-10 36 103)"/>
    <ellipse cx="52" cy="103" rx="7" ry="3"/>
  </g>
</svg>