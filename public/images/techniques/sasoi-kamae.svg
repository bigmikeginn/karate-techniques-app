<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Sasoi-kamae: Inviting guard stance -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body -->
    <rect x="46" y="23" width="8" height="32" rx="2"/>
    <!-- Front arm inviting/beckoning -->
    <rect x="54" y="28" width="12" height="5" rx="2" transform="rotate(45 60 30)"/>
    <rect x="63" y="36" width="10" height="5" rx="2" transform="rotate(90 68 38)"/>
    <!-- Back arm guarding -->
    <rect x="32" y="30" width="11" height="5" rx="2" transform="rotate(-45 37 32)"/>
    <!-- Front leg slightly bent -->
    <rect x="52" y="55" width="6" height="28" rx="2" transform="rotate(8 55 69)"/>
    <rect x="51" y="81" width="6" height="22" rx="2"/>
    <!-- Back leg -->
    <rect x="40" y="55" width="6" height="48" rx="2" transform="rotate(-5 43 79)"/>
    <!-- Feet -->
    <ellipse cx="38" cy="105" rx="7" ry="3" transform="rotate(-15 38 105)"/>
    <ellipse cx="53" cy="105" rx="7" ry="3"/>
    <!-- Beckoning motion lines -->
    <path d="M 75 35 Q 70 30 68 25" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 77 38 Q 72 33 70 28" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>