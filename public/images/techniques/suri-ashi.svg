<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Suri-ashi: Sliding footwork -->
  <g fill="#1f2937">
    <!-- Head -->
    <circle cx="50" cy="15" r="8"/>
    <!-- Body in motion -->
    <rect x="46" y="23" width="8" height="32" rx="2" transform="rotate(3 50 39)"/>
    <!-- Arms in motion -->
    <rect x="37" y="28" width="10" height="6" rx="2" transform="rotate(-25 42 31)"/>
    <rect x="53" y="28" width="10" height="6" rx="2" transform="rotate(35 58 31)"/>
    <!-- Leading leg -->
    <rect x="55" y="55" width="6" height="30" rx="2" transform="rotate(5 58 70)"/>
    <rect x="56" y="83" width="6" height="18" rx="2"/>
    <!-- Trailing leg sliding -->
    <rect x="38" y="55" width="6" height="35" rx="2" transform="rotate(-8 41 72)"/>
    <rect x="34" y="88" width="6" height="12" rx="2" transform="rotate(-15 37 94)"/>
    <!-- Feet - one sliding -->
    <ellipse cx="32" cy="102" rx="9" ry="3" transform="rotate(-20 32 102)"/>
    <ellipse cx="58" cy="103" rx="7" ry="3"/>
    <!-- Motion lines -->
    <line x1="25" y1="100" x2="20" y2="100" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="105" x2="23" y2="105" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>